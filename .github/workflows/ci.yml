name: ci

on:
  push:
    branches: [main]
  pull_request:

# Silence the "Node.js 20 actions are deprecated" warning emitted
# for the bundled JavaScript actions (actions/checkout, actions/cache,
# pnpm/action-setup, …). Forces those actions to run on the runner's
# Node 24 ahead of GitHub making it the default in June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:schemas
      - name: Verify committed JSON Schemas are in sync
        run: git diff --exit-code schemas/
