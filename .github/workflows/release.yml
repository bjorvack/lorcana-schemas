name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

# Silence the "Node.js 20 actions are deprecated" warning emitted
# for the bundled JavaScript actions (actions/checkout, actions/cache,
# pnpm/action-setup, …). Forces those actions to run on the runner's
# Node 24 ahead of GitHub making it the default in June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@bjorvack"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:schemas
      - name: Check bump matches schema diff
        env:
          PREV_TAG: ${{ github.event.before }}
        run: pnpm check:bump
      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attach JSON Schemas to GitHub Release
        run: |
          tar -czf "lorcana-schemas-${GITHUB_REF_NAME#v}.tar.gz" schemas/
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "lorcana-schemas-${GITHUB_REF_NAME#v}.tar.gz"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
